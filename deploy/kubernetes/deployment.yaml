apiVersion: apps/v1
kind: Deployment
metadata:
  name: lumenvec
  namespace: lumenvec
  labels:
    app.kubernetes.io/name: lumenvec
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: lumenvec
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lumenvec
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: lumenvec
          image: lumenvec:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: lumenvec-config
            - secretRef:
                name: lumenvec-secret
          ports:
            - name: http
              containerPort: 19190
            - name: grpc
              containerPort: 19191
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: lumenvec-data
