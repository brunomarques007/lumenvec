apiVersion: v1
kind: ConfigMap
metadata:
  name: lumenvec-config
  namespace: lumenvec
data:
  VECTOR_DB_PROTOCOL: "http"
  VECTOR_DB_PORT: "19190"
  VECTOR_DB_GRPC_PORT: "19191"
  VECTOR_DB_SNAPSHOT_PATH: "/data/snapshot.json"
  VECTOR_DB_WAL_PATH: "/data/wal.log"
  VECTOR_DB_VECTOR_STORE: "disk"
  VECTOR_DB_VECTOR_PATH: "/data/vectors"
  VECTOR_DB_SYNC_EVERY: "1"
  VECTOR_DB_SEARCH_MODE: "ann"
  VECTOR_DB_ANN_PROFILE: "balanced"
  VECTOR_DB_ANN_EVAL_SAMPLE_RATE: "0"
  VECTOR_DB_CACHE_ENABLED: "true"
  VECTOR_DB_SECURITY_PROFILE: "production"
  VECTOR_DB_SECURITY_AUTH_ENABLED: "true"
  VECTOR_DB_SECURITY_GRPC_AUTH_ENABLED: "false"
  VECTOR_DB_TLS_ENABLED: "false"
  VECTOR_DB_TRUST_FORWARDED_FOR: "false"
  VECTOR_DB_TRUSTED_PROXIES: ""
  VECTOR_DB_ACCESS_LOG: "true"
  VECTOR_DB_METRICS_ENABLED: "true"
  VECTOR_DB_STRICT_FILE_PERMISSIONS: "true"
  VECTOR_DB_STORAGE_DIR_MODE: "0700"
  VECTOR_DB_STORAGE_FILE_MODE: "0600"
