apiVersion: v1
kind: Service
metadata:
  name: lumenvec
  namespace: lumenvec
  labels:
    app.kubernetes.io/name: lumenvec
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: lumenvec
  ports:
    - name: http
      port: 19190
      targetPort: http
    - name: grpc
      port: 19191
      targetPort: grpc
