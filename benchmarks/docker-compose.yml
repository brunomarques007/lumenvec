      VECTOR_DB_VECTOR_PATH: "/data/vectors"
      VECTOR_DB_MAX_BODY_BYTES: "16777216"
      VECTOR_DB_SECURITY_PROFILE: "development"
      VECTOR_DB_SECURITY_AUTH_ENABLED: "false"
      VECTOR_DB_SECURITY_GRPC_AUTH_ENABLED: "false"
      VECTOR_DB_RATE_LIMIT_RPS: "0"
    volumes:
      - lumenvec_grpc_exact_data:/data

  lumenvec-grpc-ann:
    build:
      context: ..
      dockerfile: benchmarks/Dockerfile.lumenvec
    ports:
      - "19391:19191"
    environment:
      VECTOR_DB_PROTOCOL: "grpc"
      VECTOR_DB_GRPC_PORT: "19191"
      VECTOR_DB_SEARCH_MODE: "ann"
      VECTOR_DB_ANN_PROFILE: "balanced"
      VECTOR_DB_ANN_M: "16"
      VECTOR_DB_ANN_EF_CONSTRUCTION: "64"
      VECTOR_DB_ANN_EF_SEARCH: "64"
      VECTOR_DB_VECTOR_STORE: "memory"
      VECTOR_DB_SNAPSHOT_PATH: "/data/snapshot.json"
      VECTOR_DB_WAL_PATH: "/data/wal.log"
      VECTOR_DB_VECTOR_PATH: "/data/vectors"
      VECTOR_DB_MAX_BODY_BYTES: "16777216"
      VECTOR_DB_SECURITY_PROFILE: "development"
      VECTOR_DB_SECURITY_AUTH_ENABLED: "false"
      VECTOR_DB_SECURITY_GRPC_AUTH_ENABLED: "false"
      VECTOR_DB_RATE_LIMIT_RPS: "0"
    volumes:
      - lumenvec_grpc_ann_data:/data

  lumenvec-grpc-ann-fast:
    build:
      context: ..
      dockerfile: benchmarks/Dockerfile.lumenvec
    ports:
      - "19392:19191"
    environment:
      VECTOR_DB_PROTOCOL: "grpc"
      VECTOR_DB_GRPC_PORT: "19191"
      VECTOR_DB_SEARCH_MODE: "ann"
      VECTOR_DB_ANN_PROFILE: "fast"
      VECTOR_DB_ANN_M: "8"
      VECTOR_DB_ANN_EF_CONSTRUCTION: "32"
      VECTOR_DB_ANN_EF_SEARCH: "32"
      VECTOR_DB_VECTOR_STORE: "memory"
      VECTOR_DB_SNAPSHOT_PATH: "/data/snapshot.json"
      VECTOR_DB_WAL_PATH: "/data/wal.log"
      VECTOR_DB_VECTOR_PATH: "/data/vectors"
      VECTOR_DB_MAX_BODY_BYTES: "16777216"
      VECTOR_DB_SECURITY_PROFILE: "development"
      VECTOR_DB_SECURITY_AUTH_ENABLED: "false"
      VECTOR_DB_SECURITY_GRPC_AUTH_ENABLED: "false"
      VECTOR_DB_RATE_LIMIT_RPS: "0"
    volumes:
      - lumenvec_grpc_ann_fast_data:/data

  lumenvec-grpc-ann-quality:
    build:
      context: ..
      dockerfile: benchmarks/Dockerfile.lumenvec
    ports:
      - "19393:19191"
    environment:
      VECTOR_DB_PROTOCOL: "grpc"
      VECTOR_DB_GRPC_PORT: "19191"
      VECTOR_DB_SEARCH_MODE: "ann"
      VECTOR_DB_ANN_PROFILE: "quality"
      VECTOR_DB_ANN_M: "24"
      VECTOR_DB_ANN_EF_CONSTRUCTION: "96"
      VECTOR_DB_ANN_EF_SEARCH: "96"
      VECTOR_DB_VECTOR_STORE: "memory"
      VECTOR_DB_SNAPSHOT_PATH: "/data/snapshot.json"
      VECTOR_DB_WAL_PATH: "/data/wal.log"
      VECTOR_DB_VECTOR_PATH: "/data/vectors"
      VECTOR_DB_MAX_BODY_BYTES: "16777216"
      VECTOR_DB_SECURITY_PROFILE: "development"
      VECTOR_DB_SECURITY_AUTH_ENABLED: "false"
      VECTOR_DB_SECURITY_GRPC_AUTH_ENABLED: "false"
      VECTOR_DB_RATE_LIMIT_RPS: "0"
    volumes:
      - lumenvec_grpc_ann_quality_data:/data

  qdrant:
    image: qdrant/qdrant:v1.17.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  pgvector:
    image: pgvector/pgvector:pg16
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "postgres"
    volumes:
      - pgvector_data:/var/lib/postgresql/data

  chroma:
    image: chromadb/chroma:1.5.3
    ports:
      - "18000:8000"
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: "/data"
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - chroma_data:/data

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.36.9
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --scheme
      - http
    ports:
      - "18080:8080"
      - "15051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: "25"
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      CLUSTER_HOSTNAME: "node1"
      DISABLE_TELEMETRY: "true"
    volumes:
      - weaviate_data:/var/lib/weaviate

volumes:
  lumenvec_exact_data:
  lumenvec_ann_data:
  lumenvec_ann_fast_data:
  lumenvec_ann_quality_data:
  lumenvec_grpc_exact_data:
  lumenvec_grpc_ann_data:
  lumenvec_grpc_ann_fast_data:
  lumenvec_grpc_ann_quality_data:
  qdrant_data:
  pgvector_data:
  chroma_data:
  weaviate_data:
