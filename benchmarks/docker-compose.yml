      VECTOR_DB_PROTOCOL: "http"
      VECTOR_DB_PORT: "19190"
      VECTOR_DB_SEARCH_MODE: "ann"
      VECTOR_DB_ANN_PROFILE: "fast"
      VECTOR_DB_ANN_M: "8"
      VECTOR_DB_ANN_EF_CONSTRUCTION: "32"
      VECTOR_DB_ANN_EF_SEARCH: "32"
      VECTOR_DB_VECTOR_STORE: "memory"
      VECTOR_DB_SNAPSHOT_PATH: "/data/snapshot.json"
      VECTOR_DB_WAL_PATH: "/data/wal.log"
      VECTOR_DB_VECTOR_PATH: "/data/vectors"
      VECTOR_DB_MAX_BODY_BYTES: "16777216"
      VECTOR_DB_SECURITY_PROFILE: "development"
      VECTOR_DB_SECURITY_AUTH_ENABLED: "false"
      VECTOR_DB_RATE_LIMIT_RPS: "0"
    volumes:
      - lumenvec_ann_fast_data:/data

  lumenvec-ann-quality:
    build:
      context: ..
      dockerfile: benchmarks/Dockerfile.lumenvec
    ports:
      - "19293:19190"
    environment:
      VECTOR_DB_PROTOCOL: "http"
      VECTOR_DB_PORT: "19190"
      VECTOR_DB_SEARCH_MODE: "ann"
      VECTOR_DB_ANN_PROFILE: "quality"
      VECTOR_DB_ANN_M: "24"
      VECTOR_DB_ANN_EF_CONSTRUCTION: "96"
      VECTOR_DB_ANN_EF_SEARCH: "96"
      VECTOR_DB_VECTOR_STORE: "memory"
      VECTOR_DB_SNAPSHOT_PATH: "/data/snapshot.json"
      VECTOR_DB_WAL_PATH: "/data/wal.log"
      VECTOR_DB_VECTOR_PATH: "/data/vectors"
      VECTOR_DB_MAX_BODY_BYTES: "16777216"
